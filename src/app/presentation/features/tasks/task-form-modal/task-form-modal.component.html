<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()" color="medium">
        <ion-icon slot="icon-only" name="close" />
      </ion-button>
    </ion-buttons>
    <ion-title>{{ task ? 'Edit Task' : 'New Task' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button [strong]="true" (click)="submit()" [disabled]="!title()" color="primary" fill="clear">
        Save
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    <div class="input-group">
      <div class="label-with-icon">
        <ion-icon name="text-outline" color="primary"></ion-icon>
        <label class="premium-label">What needs to be done? *</label>
      </div>
      <div class="premium-input-wrapper">
        <ion-input
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
          placeholder="e.g. Design app logo"
          class="premium-input"
          required />
      </div>
    </div>

    <div class="input-group">
      <div class="label-with-icon">
        <ion-icon name="document-text-outline" color="primary"></ion-icon>
        <label class="premium-label">Description (Optional)</label>
      </div>
      <div class="premium-input-wrapper">
        <ion-textarea
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
          placeholder="Add some context or subtasks..."
          [rows]="6"
          class="premium-input premium-textarea" />
      </div>
    </div>

    @if (categories.length > 0) {
      <div class="input-group">
        <div class="label-with-icon">
          <ion-icon name="pricetag-outline" color="primary"></ion-icon>
          <label class="premium-label">Category (Optional)</label>
        </div>
        <div class="premium-input-wrapper">
          <ion-select
            [ngModel]="selectedCategoryId()"
            (ngModelChange)="selectedCategoryId.set($event)"
            placeholder="Assign to category"
            interface="popover"
            class="premium-select">
            <ion-select-option [value]="null">No Category</ion-select-option>
            @for (cat of categories; track cat.id) {
              <ion-select-option [value]="cat.id">{{ cat.name }}</ion-select-option>
            }
          </ion-select>
        </div>
      </div>
    }
    
    <div class="form-footer">
      <p class="helper-text">* Required field</p>
    </div>
  </div>
</ion-content>
