<ion-content class="ion-padding">
  <div class="login-container">
    <div class="logo-wrapper animate-fade-in">
      <img
        src="assets/logo.png"
        alt="Logo"
        class="logo-main"
        onerror="this.src = 'https://ionicframework.com/docs/img/demos/avatar.svg'"
      />
      <p style="color: var(--ion-color-medium); font-weight: 500">To Do List - egx</p>
    </div>

    <ion-card mode="ios" class="animate-fade-in">
      <ion-card-header>
        <ion-card-title>Login</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <form (submit)="onSubmit($event)">
          <ion-item lines="none">
            <ion-icon
              slot="start"
              name="mail-outline"
              color="medium"
              style="margin-right: 12px"
            ></ion-icon>
            <ion-input
              type="email"
              placeholder="Example: example@gmail.com"
              [formControl]="emailControl"
              autocomplete="email"
              required
            />
          </ion-item>

          <ion-button
            expand="block"
            type="submit"
            [disabled]="emailControl.invalid || isLoading"
            class="login-btn"
          >
            {{ isLoading ? 'Entering...' : 'Unlock Account' }}
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
    <div class="version-footer">
      <span>v{{ appVersion }}</span>
    </div>
  </div>

  <ion-loading [isOpen]="isLoading" message="Authenticating..."></ion-loading>
</ion-content>
