<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon slot="icon-only" name="arrow-back" />
      </ion-button>
    </ion-buttons>
    <ion-title>Categories</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  @if (isLoading()) {
    <ion-list>
      @for (i of [1,2,3]; track i) {
        <ion-item>
          <div slot="start" class="color-dot skeleton-dot"></div>
          <ion-label>
            <ion-skeleton-text [animated]="true" style="width:60%;height:1rem;border-radius:4px" />
          </ion-label>
        </ion-item>
      }
    </ion-list>
  } @else if (categories().length === 0) {
    <div class="empty-state">
      <ion-text color="medium">
        <p>No categories yet. Tap + to create one!</p>
      </ion-text>
    </div>
  } @else {
    <ion-list>
      @for (cat of categories(); track trackByCategoryId($index, cat)) {
        <ion-item-sliding>
          <ion-item>
            <div slot="start" class="color-dot" [style.background]="cat.color"></div>
            <ion-label>{{ cat.name }}</ion-label>
          </ion-item>

          <ion-item-options side="end">
            <ion-item-option color="primary" (click)="openCategoryModal(cat)">
              <ion-icon slot="icon-only" name="create" />
            </ion-item-option>
            <ion-item-option color="danger" (click)="onDelete(cat)">
              <ion-icon slot="icon-only" name="trash" />
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      }
    </ion-list>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="openCategoryModal()">
      <ion-icon name="add" />
    </ion-fab-button>
  </ion-fab>

</ion-content>
